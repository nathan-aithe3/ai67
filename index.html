<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nathan AI | Midnight</title>
    <style>
        :root { --accent: #bb86fc; --bg: #0a0a0a; --card: #1a1a1a; --text: #e0e0e0; --user-bg: #3700b3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loader-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loader-content { width: 80%; max-width: 400px; text-align: left; font-family: 'Courier New', monospace; }
        .loading-title { color: var(--accent); font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .terminal-text { font-size: 12px; color: #666; margin-bottom: 5px; height: 20px; overflow: hidden; }
        #load-progress-container { width: 100%; height: 2px; background: #222; margin-top: 15px; border-radius: 2px; overflow: hidden; }
        #load-progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 10px var(--accent); }

        /* --- CHAT INTERFACE --- */
        header { 
            padding: 20px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); 
            border-bottom: 1px solid #222; text-align: center; font-weight: 700; font-size: 20px; color: var(--accent);
        }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; font-size: 16px; position: relative; }
        .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #222; }
        .user { background: var(--user-bg); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        #status-bar { height: 3px; background: transparent; width: 100%; }
        .active-pulse { background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Controls */
        #controls { padding: 15px 20px 35px; background: var(--bg); border-top: 1px solid #222; display: flex; gap: 12px; align-items: center; }
        .input-box { flex: 1; background: #1a1a1a; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #333; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #888; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); color: var(--accent); }
        #mic-btn.recording { color: #ff4444; animation: heart-beat 1s infinite; }
        @keyframes heart-beat { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div id="loader-content">
        <div class="loading-title">NATHAN_AI_OS</div>
        <div id="term-log" class="terminal-text">Initializing Kernel...</div>
        <div id="load-progress-container"><div id="load-progress-fill"></div></div>
        <div id="percent-text" style="font-size: 10px; color: #444; margin-top: 8px; text-align: right;">0%</div>
    </div>
</div>

<header>Nathan AI</header>
<div id="status-bar"></div>

<div id="chat">
    <div class="msg bot">System online. What's the plan?</div>
</div>

<div id="controls">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Send a message..." disabled>
        <button id="mic-btn" class="icon-btn">🎙️</button>
    </div>
    <button id="sendBtn" class="icon-btn" disabled>➤</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const loader = document.getElementById('loader-overlay');
    const termLog = document.getElementById('term-log');
    const loadFill = document.getElementById('load-progress-fill');
    const percentText = document.getElementById('percent-text');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('mic-btn');
    const statusBar = document.getElementById('status-bar');

    const engine = new webllm.MLCEngine();

    // Loading Logic
    engine.setInitProgressCallback((report) => {
        const p = Math.round(report.progress * 100);
        loadFill.style.width = p + '%';
        percentText.innerText = p + '%';
        termLog.innerText = report.text;

        if (report.progress === 1) {
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                input.disabled = btn.disabled = false;
            }, 1000);
        }
    });

    async function init() {
        try {
            await engine.reload("Llama-3-8B-Instruct-q4f32_1-MLC");
        } catch (e) { 
            termLog.innerText = "CRITICAL ERROR: WebGPU Not Detected";
            termLog.style.color = "red";
        }
    }

    // Voice Input
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRec) {
        const rec = new SpeechRec();
        micBtn.onclick = () => { rec.start(); micBtn.classList.add('recording'); };
        rec.onresult = (e) => { input.value = e.results[0][0].transcript; sendMessage(); };
        rec.onend = () => micBtn.classList.remove('recording');
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        btn.disabled = true;
        statusBar.classList.add('active-pulse');

        const botMsg = addMsg("", 'bot');
        let fullResponse = "";

        const systemMsg = "Your name is Nathan AI. You are a sharp, direct, and witty companion. No corporate fluff. Be candid, bold, and help the user with whatever they need, tech or otherwise.";

        const chunks = await engine.chat.completions.create({
            messages: [{ role: "system", content: systemMsg }, { role: "user", content: text }],
            stream: true,
        });

        statusBar.classList.remove('active-pulse');

        for await (const chunk of chunks) {
            fullResponse += chunk.choices[0]?.delta?.content || "";
            botMsg.innerText = fullResponse;
            document.getElementById('chat').scrollTop = chat.scrollHeight;
        }
        btn.disabled = false;
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = chat.scrollHeight;
        return div;
    }

    btn.onclick = sendMessage;
    input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    init();
</script>

</body>
</html>
