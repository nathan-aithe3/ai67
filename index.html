<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task-Master AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #container { width: 500px; height: 700px; background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0f172a; scroll-behavior: smooth; }
        .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.6; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #3b82f6; }
        .ai { align-self: flex-start; background: #334155; border: 1px solid #475569; }
        #input-row { padding: 20px; background: #1e293b; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .loading { font-size: 12px; color: #94a3b8; text-align: center; padding: 5px; display: none; }
    </style>
</head>
<body>

<div id="container">
    <div style="padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #334155;">AI TASK ASSISTANT</div>
    <div id="display">
        <div class="bubble ai">I am ready for tasks. Try asking: "Write a 3-day workout plan" or "Explain gravity to a 5-year-old."</div>
    </div>
    <div id="loader" class="loading">AI is processing... (may take 20s on first run)</div>
    <div id="input-row">
        <input type="text" id="userInput" placeholder="Type a task here...">
        <button onclick="execute()">Run</button>
    </div>
</div>

<script>
    // 1. SET YOUR API KEY HERE (GET ONE FOR FREE AT HUGGINGFACE.CO)
    const API_KEY = "YOUR_HF_TOKEN_HERE"; 
    const MODEL_URL = "https://router.huggingface.co/hf-inference/v1/chat/completions";

    async function execute() {
        const input = document.getElementById('userInput');
        const display = document.getElementById('display');
        const loader = document.getElementById('loader');
        const text = input.value.trim();

        if(!text) return;

        display.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";
        loader.style.display = "block";
        display.scrollTop = display.scrollHeight;

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}` // Leave this if you don't have a key yet
                },
                body: JSON.stringify({
                    model: "mistralai/Mistral-7B-Instruct-v0.3",
                    messages: [
                        { role: "system", content: "You are a professional assistant. Complete the user's task accurately, clearly, and immediately." },
                        { role: "user", content: text }
                    ],
                    max_tokens: 1000
                })
            });

            const data = await response.json();
            loader.style.display = "none";

            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                display.innerHTML += `<div class="bubble ai">${reply}</div>`;
            } else {
                display.innerHTML += `<div class="bubble ai"><em>The AI is waking up. Try sending that again in 10 seconds.</em></div>`;
            }

        } catch (e) {
            loader.style.display = "none";
            display.innerHTML += `<div class="bubble ai">Error: API unreachable. This usually happens when running as a local file without an API Key.</div>`;
        }
        display.scrollTop = display.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') execute(); });
</script>

</body>
</html>
